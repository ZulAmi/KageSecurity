name: Publish Docker Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-helm:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Log in to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          helm package helm/kagesec
          helm push kagesec-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  publish-pypi:
    name: Publish to PyPI (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    environment: release
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            bin_name: kagesec-engine
            plat_name: manylinux_2_17_x86_64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            bin_name: kagesec-engine
            plat_name: macosx_11_0_arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            bin_name: kagesec-engine
            plat_name: macosx_10_15_x86_64
          - os: windows-latest
            goos: windows
            goarch: amd64
            bin_name: kagesec-engine.exe
            plat_name: win_amd64

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: engine/go.sum

      - name: Build Go engine
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          cd engine
          go build -ldflags="-s -w" -o ../scanner/_bin/${{ matrix.bin_name }} .

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build platform wheel
        shell: bash
        run: |
          pip install build wheel
          python -m build --wheel
          # Retag Linux wheel to manylinux so PyPI accepts it
          if [[ "${{ matrix.goos }}" == "linux" ]]; then
            wheel tags --plat-name ${{ matrix.plat_name }} --remove dist/kagesec-*.whl
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
