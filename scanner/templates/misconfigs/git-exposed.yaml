id: exposed-git-directory
info:
  name: Exposed .git Directory
  severity: high
  cvss: 7.5
  cwe: CWE-538
  owasp: "A05:2021"
  tags: [git, exposure, misconfiguration, source-code]
  description: >
    The .git directory is publicly accessible on the web server. An attacker can use
    tools like git-dumper to reconstruct the full source code repository, exposing
    application logic, hardcoded credentials, internal API endpoints, and secrets
    that may have been committed and later deleted.
  remediation: >
    Block access to .git via server config: Nginx: location ~ /\.git { deny all; }
    Apache: <DirectoryMatch "\.git"> Require all denied </DirectoryMatch>

requests:
  - method: GET
    path:
      - "{{BaseURL}}/.git/HEAD"
      - "{{BaseURL}}/.git/config"
    matchers-condition: or
    matchers:
      - type: regex
        part: body
        regex:
          - "ref:\\s*refs/"
          - "\\[core\\]"
