id: exposed-swagger-ui
info:
  name: Swagger / OpenAPI Documentation Exposed in Production
  severity: low
  cvss: 3.1
  cwe: CWE-200
  owasp: "A05:2021"
  tags: [swagger, openapi, exposure, api, documentation]
  description: >
    Swagger UI or OpenAPI documentation is publicly accessible. This provides an attacker
    with a complete map of all API endpoints, their parameters, expected input types, and
    authentication requirements — dramatically reducing the effort required for API enumeration.
  remediation: Disable Swagger UI in production or restrict it to authenticated users / internal networks.

requests:
  - method: GET
    path:
      - "{{BaseURL}}/swagger-ui.html"
      - "{{BaseURL}}/swagger-ui/"
      - "{{BaseURL}}/swagger/"
      - "{{BaseURL}}/api-docs"
      - "{{BaseURL}}/v2/api-docs"
      - "{{BaseURL}}/v3/api-docs"
      - "{{BaseURL}}/openapi.json"
      - "{{BaseURL}}/openapi.yaml"
    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "swagger-ui"
          - "Swagger UI"
          - "openapi"
          - "\"swagger\":"
