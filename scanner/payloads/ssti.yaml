# Server-Side Template Injection payloads.
# Each entry: payload, expected (what should appear in response), engine hint.
# Module: scanner/modules/ssti.py

payloads:
  - payload: "{{7*7}}"
    expected: "49"
    engine: "Jinja2/Twig"
  - payload: "${7*7}"
    expected: "49"
    engine: "Freemarker/Thymeleaf"
  - payload: "#{7*7}"
    expected: "49"
    engine: "Pebble/Spring EL"
  - payload: "<%= 7*7 %>"
    expected: "49"
    engine: "ERB/EJS"
  - payload: "{{7*'7'}}"
    expected: "7777777"
    engine: "Jinja2"
  - payload: "${{7*7}}"
    expected: "49"
    engine: "Jinja2 (alt)"
  - payload: "{7*7}"
    expected: "49"
    engine: "Smarty"
  - payload: "{{config}}"
    expected: "Config("
    engine: "Jinja2 (config object)"
  - payload: "{{self}}"
    expected: "<TemplateReference"
    engine: "Jinja2 (self ref)"
  - payload: "{% raw %}{{7*7}}{% endraw %}"
    expected: "49"
    engine: "Twig (raw bypass)"
  - payload: "{{ ''.__class__.__mro__ }}"
    expected: "object"
    engine: "Jinja2 (MRO probe)"
  - payload: "[[${7*7}]]"
    expected: "49"
    engine: "Thymeleaf"
